<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Action recommendation visualization</title>
  <desc id="desc">Decision queue with approval flow and completion checkmarks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3fbf9"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2fd7c6"/>
      <stop offset="100%" stop-color="#0a1a31"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="700" rx="34" fill="url(#bg)"/>

  <g transform="translate(90 122)">
    <rect x="0" y="0" width="640" height="110" rx="22" fill="#ffffff" stroke="#d6e4ee"/>
    <rect x="0" y="136" width="640" height="110" rx="22" fill="#ffffff" stroke="#d6e4ee"/>
    <rect x="0" y="272" width="640" height="110" rx="22" fill="#ffffff" stroke="#d6e4ee"/>

    <circle cx="48" cy="55" r="18" fill="#2fd7c6"/>
    <path d="M38 55 L46 63 L59 46" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="48" cy="191" r="18" fill="#2fd7c6" opacity="0.8"/>
    <path d="M38 191 L46 199 L59 182" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="48" cy="327" r="18" fill="#f0f5fa" stroke="#bccddd"/>
    <circle cx="48" cy="327" r="8" fill="#8ca4bc">
      <animate attributeName="r" values="8;11;8" dur="2.6s" repeatCount="indefinite"/>
    </circle>

    <text x="84" y="64" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#0a1a31">Reorder 4 cases now</text>
    <text x="84" y="200" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#0a1a31">Reduce PO on low-velocity SKU</text>
    <text x="84" y="336" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#506786">Review weekend price change</text>
  </g>

  <g transform="translate(760 130)">
    <path d="M28 74 C 130 74, 130 74, 220 74" stroke="url(#flow)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="12 14">
      <animate attributeName="stroke-dashoffset" from="0" to="-150" dur="4s" repeatCount="indefinite"/>
    </path>
    <circle cx="24" cy="74" r="22" fill="#2fd7c6"/>
    <text x="18" y="82" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">1</text>

    <rect x="222" y="36" width="260" height="76" rx="20" fill="#ffffff" stroke="#d6e4ee"/>
    <text x="248" y="84" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#0a1a31">Approve</text>

    <g transform="translate(0 170)">
      <rect x="0" y="0" width="482" height="260" rx="28" fill="#ffffff" stroke="#d6e4ee"/>
      <circle cx="52" cy="58" r="16" fill="#2fd7c6"/>
      <text x="88" y="68" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0a1a31">Priority queue updated</text>
      <text x="88" y="108" font-family="Inter, Arial, sans-serif" font-size="22" fill="#506786">Recommendation pushed to operator review</text>
      <text x="88" y="152" font-family="Inter, Arial, sans-serif" font-size="22" fill="#506786">Rationale attached • confidence score included</text>
      <text x="88" y="196" font-family="Inter, Arial, sans-serif" font-size="22" fill="#506786">Approval time: 41 seconds</text>
    </g>
  </g>

  <g fill="#506786" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">
    <text x="86" y="82">From signal to next move, with no guesswork</text>
  </g>
</svg>
