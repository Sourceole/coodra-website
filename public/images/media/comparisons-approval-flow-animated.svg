<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Coodra real approval flow</title>
  <desc id="desc">Premium animated light-mode approval workflow showing queued decisions, review confidence, and approved purchase routing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#e7f1ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f9ff"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2fd7c6"/>
      <stop offset="100%" stop-color="#1ebfb3"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.22" cy="0.18" r="0.72">
      <stop offset="0%" stop-color="#2fd7c6" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#2fd7c6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.78" cy="0.82" r="0.68">
      <stop offset="0%" stop-color="#84e8de" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#84e8de" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .lift { animation: lift 7.2s ease-in-out infinite; }
      .queueMove { animation: queueMove 2.8s ease-in-out infinite; }
      .queueMove2 { animation-delay: .35s; }
      .queueMove3 { animation-delay: .7s; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      .flow { stroke-dasharray: 10 10; animation: flow 1.5s linear infinite; }
      .ok { animation: ok 2s ease-in-out infinite; }
      .ok2 { animation-delay: .65s; }
      @keyframes lift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes queueMove { 0%,100% { transform: translateX(0); opacity: .86; } 50% { transform: translateX(5px); opacity: 1; } }
      @keyframes pulse { 0%,100% { opacity: .45; transform: scale(1); } 50% { opacity: .95; transform: scale(1.05); } }
      @keyframes flow { to { stroke-dashoffset: -72; } }
      @keyframes ok { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="220" cy="130" r="250" fill="url(#glow1)" class="pulse"/>
  <circle cx="1060" cy="590" r="270" fill="url(#glow2)" class="pulse"/>

  <rect x="120" y="70" width="1040" height="580" rx="26" fill="#f4f9ff" stroke="#cadeef"/>
  <rect x="152" y="102" width="976" height="70" rx="16" fill="#ffffff" stroke="#d7e6f4"/>
  <text x="184" y="145" fill="#17324f" font-size="32" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Decision Approval Workflow</text>

  <g class="lift">
    <rect x="250" y="220" width="240" height="360" rx="20" fill="url(#panel)" stroke="#d3e5f3"/>
    <text x="278" y="260" fill="#21486a" font-size="22" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Queue</text>

    <g class="queueMove">
      <rect x="276" y="282" width="188" height="76" rx="12" fill="#f8fcff" stroke="#d8e8f5"/>
      <text x="294" y="314" fill="#123552" font-size="17" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Reorder SKU A42</text>
      <text x="294" y="338" fill="#517596" font-size="14" font-family="Inter, Segoe UI, sans-serif">Confidence 93%  +$1,830</text>
    </g>

    <g class="queueMove queueMove2">
      <rect x="276" y="372" width="188" height="76" rx="12" fill="#f8fcff" stroke="#d8e8f5"/>
      <text x="294" y="404" fill="#123552" font-size="17" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Swap Supplier B</text>
      <text x="294" y="428" fill="#517596" font-size="14" font-family="Inter, Segoe UI, sans-serif">Confidence 89%  Margin-safe</text>
    </g>

    <g class="queueMove queueMove3">
      <rect x="276" y="462" width="188" height="76" rx="12" fill="#f8fcff" stroke="#d8e8f5"/>
      <text x="294" y="494" fill="#123552" font-size="17" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Delay PO #901</text>
      <text x="294" y="518" fill="#517596" font-size="14" font-family="Inter, Segoe UI, sans-serif">Confidence 80%  Demand dip</text>
    </g>
  </g>

  <g class="lift">
    <rect x="530" y="260" width="220" height="280" rx="18" fill="url(#panel)" stroke="#d3e5f3"/>
    <text x="560" y="302" fill="#21486a" font-size="21" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Review Gate</text>

    <circle cx="640" cy="382" r="64" fill="#f4fbff" stroke="#cfe2f2" class="pulse"/>
    <circle cx="640" cy="382" r="37" fill="none" stroke="url(#teal)" stroke-width="8"/>
    <text x="610" y="391" fill="#0c847d" font-size="23" font-family="Inter, Segoe UI, sans-serif" font-weight="700">91%</text>
    <text x="586" y="441" fill="#4f7395" font-size="15" font-family="Inter, Segoe UI, sans-serif">Policy aligned</text>
    <rect x="564" y="462" width="152" height="30" rx="15" fill="#2fd7c6" opacity=".2"/>
  </g>

  <g class="lift">
    <rect x="790" y="220" width="240" height="360" rx="20" fill="url(#panel)" stroke="#d3e5f3"/>
    <text x="818" y="260" fill="#21486a" font-size="22" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Approvals</text>

    <rect x="816" y="286" width="188" height="70" rx="12" fill="#f4fbff" stroke="#d8e8f5"/>
    <text x="838" y="327" fill="#107e77" font-size="18" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Approved</text>
    <g class="ok"><circle cx="970" cy="321" r="11" fill="#2fd7c6"/><path d="M965 321l4 4 8-9" stroke="#f7fdff" stroke-width="3" fill="none"/></g>

    <rect x="816" y="374" width="188" height="70" rx="12" fill="#f4fbff" stroke="#d8e8f5"/>
    <text x="838" y="415" fill="#107e77" font-size="18" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Queued to PO</text>
    <g class="ok ok2"><circle cx="970" cy="409" r="11" fill="#2fd7c6"/><path d="M965 409l4 4 8-9" stroke="#f7fdff" stroke-width="3" fill="none"/></g>

    <rect x="816" y="462" width="188" height="70" rx="12" fill="#f4fbff" stroke="#d8e8f5"/>
    <text x="838" y="503" fill="#107e77" font-size="18" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Sent to Vendor</text>
    <g class="ok"><circle cx="970" cy="497" r="11" fill="#2fd7c6"/><path d="M965 497l4 4 8-9" stroke="#f7fdff" stroke-width="3" fill="none"/></g>
  </g>

  <path d="M490 382 C 518 382, 526 382, 530 382" fill="none" stroke="#1eb8ac" stroke-width="4" class="flow"/>
  <path d="M750 382 C 770 382, 780 382, 790 382" fill="none" stroke="#1eb8ac" stroke-width="4" class="flow"/>

  <rect x="126" y="644" width="270" height="8" rx="4" fill="#2fd7c6" opacity=".52" filter="url(#soft)"/>
</svg>
