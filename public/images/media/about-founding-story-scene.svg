<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9FCFF"/>
      <stop offset="1" stop-color="#EFF7FF"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2FD7C6"/>
      <stop offset="1" stop-color="#8DEEE5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0A1A31" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0A1A31" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1280" height="800" rx="24" fill="url(#bg)"/>

  <rect x="48" y="48" width="1184" height="704" rx="24" fill="#FFFFFF" stroke="#D9E5F3" filter="url(#shadow)"/>

  <rect x="86" y="84" width="1108" height="64" rx="14" fill="#F8FBFF" stroke="#DEE9F6"/>
  <circle cx="120" cy="116" r="7" fill="#FF5F57"/>
  <circle cx="146" cy="116" r="7" fill="#FEBB2E"/>
  <circle cx="172" cy="116" r="7" fill="#28C840"/>
  <text x="226" y="122" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#0A1A31">Coodra Product Story</text>
  <text x="1164" y="122" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#2FD7C6">Built for independent retailers</text>

  <rect x="98" y="176" width="420" height="538" rx="18" fill="#FBFDFF" stroke="#DEE9F6"/>
  <text x="132" y="224" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0A1A31">Starting point</text>
  <text x="132" y="252" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B7390">Scattered signals across POS, inventory,</text>
  <text x="132" y="274" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B7390">and approvals slow teams down.</text>

  <rect x="132" y="308" width="352" height="106" rx="14" fill="#FFFFFF" stroke="#D6E4F2" filter="url(#softShadow)"/>
  <text x="160" y="350" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0A1A31">Signal: stock pressure</text>
  <text x="160" y="378" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5B7390">Oatly Barista trending +24%</text>

  <rect x="132" y="430" width="352" height="106" rx="14" fill="#FFFFFF" stroke="#D6E4F2" filter="url(#softShadow)"/>
  <text x="160" y="472" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0A1A31">Risk: margin leak</text>
  <text x="160" y="500" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5B7390">Fiddlehead Coffee -$186/mo</text>

  <rect x="132" y="552" width="352" height="126" rx="14" fill="#FFFFFF" stroke="#D6E4F2" filter="url(#softShadow)"/>
  <text x="160" y="594" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0A1A31">Action: approval ready</text>
  <text x="160" y="622" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5B7390">Reorder 4 cases from distributor</text>
  <rect x="336" y="580" width="124" height="44" rx="22" fill="url(#teal)"/>
  <text x="398" y="608" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">Approve</text>

  <path d="M548 342 C640 342 676 342 770 342" stroke="#2FD7C6" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M548 464 C640 464 676 464 770 464" stroke="#2FD7C6" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M548 604 C640 604 676 604 770 604" stroke="#2FD7C6" stroke-width="3" stroke-dasharray="8 8"/>

  <circle cx="770" cy="342" r="8" fill="#2FD7C6"/>
  <circle cx="770" cy="464" r="8" fill="#2FD7C6"/>
  <circle cx="770" cy="604" r="8" fill="#2FD7C6"/>

  <rect x="790" y="176" width="370" height="538" rx="18" fill="#F9FCFF" stroke="#DEE9F6"/>
  <text x="822" y="224" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0A1A31">Operating layer</text>
  <text x="822" y="252" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B7390">Practical workflows, clear rationale,</text>
  <text x="822" y="274" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B7390">measurable outcomes.</text>

  <rect x="822" y="308" width="306" height="120" rx="14" fill="#FFFFFF" stroke="#D6E4F2"/>
  <text x="852" y="350" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0A1A31">What changed</text>
  <text x="852" y="378" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5B7390">Demand shifted + stock cover tightened.</text>

  <rect x="822" y="448" width="306" height="120" rx="14" fill="#FFFFFF" stroke="#D6E4F2"/>
  <text x="852" y="490" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0A1A31">Why it matters</text>
  <text x="852" y="518" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5B7390">Risk tied to stockout + margin impact.</text>

  <rect x="822" y="588" width="306" height="96" rx="14" fill="#EFFFFB" stroke="#BFEBDD"/>
  <text x="852" y="628" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0A1A31">Next best move</text>
  <text x="852" y="656" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0C7E73">Review, approve, and move faster.</text>
</svg>
