<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a31"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2fd7c6"/>
      <stop offset="100%" stop-color="#1fb5a3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#1a3560" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#teal)"/>

  <!-- Header -->
  <text x="600" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2fd7c6" text-anchor="middle" letter-spacing="3">INVENTORY PLANNING · SAFETY STOCK</text>
  <text x="600" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">Setting Safety Stock</text>
  <text x="600" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">Without Overcomplicating It</text>
  <text x="600" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#7aa8c4" text-anchor="middle">Most retailers hold too much or nothing. Here is the practical middle ground.</text>
  <line x1="180" y1="225" x2="1020" y2="225" stroke="#1e3a6e" stroke-width="1"/>

  <!-- Three buffer level cards -->
  <!-- Card 1: Too thin -->
  <g transform="translate(80, 252)">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="300" height="180" rx="10" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <!-- Label badge -->
    <rect x="90" y="-12" width="120" height="24" rx="12" fill="#ef4444"/>
    <text x="150" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">TOO THIN</text>
    <!-- Bar: thin buffer -->
    <rect x="20" y="26" width="260" height="70" rx="6" fill="#ef4444" opacity="0.15"/>
    <rect x="20" y="66" width="260" height="30" rx="4" fill="#ef4444"/>
    <text x="150" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ef4444" text-anchor="middle">0 weeks buffer</text>
    <!-- Description -->
    <text x="150" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Constant stockouts</text>
    <text x="150" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Emergency orders. Rush fees.</text>
    <text x="150" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Customer defections.</text>
  </g>

  <!-- Card 2: Just right (recommended) -->
  <g transform="translate(450, 252)">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="300" height="180" rx="10" fill="none" stroke="#2fd7c6" stroke-width="2"/>
    <!-- Label badge -->
    <rect x="90" y="-12" width="120" height="24" rx="12" fill="#2fd7c6"/>
    <text x="150" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0a1a31" text-anchor="middle">JUST RIGHT</text>
    <!-- Bar: 2-week buffer (layered) -->
    <rect x="20" y="26" width="260" height="70" rx="6" fill="#2fd7c6" opacity="0.15"/>
    <rect x="20" y="26" width="130" height="22" rx="4" fill="#2fd7c6"/>
    <rect x="20" y="50" width="260" height="20" rx="4" fill="#2fd7c6" opacity="0.6"/>
    <rect x="20" y="72" width="260" height="24" rx="4" fill="#2fd7c6" opacity="0.3"/>
    <text x="150" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2fd7c6" text-anchor="middle">2-week buffer</text>
    <!-- Description -->
    <text x="150" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">No stockouts. No excess capital.</text>
    <text x="150" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Covers lead time gap + demand spike.</text>
    <text x="150" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">The practical baseline.</text>
  </g>

  <!-- Card 3: Too high -->
  <g transform="translate(820, 252)">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="300" height="180" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- Label badge -->
    <rect x="90" y="-12" width="120" height="24" rx="12" fill="#f59e0b"/>
    <text x="150" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0a1a31" text-anchor="middle">TOO HIGH</text>
    <!-- Bar: 4+ weeks -->
    <rect x="20" y="26" width="260" height="70" rx="6" fill="#f59e0b" opacity="0.15"/>
    <rect x="20" y="26" width="260" height="35" rx="4" fill="#f59e0b"/>
    <rect x="20" y="63" width="260" height="20" rx="4" fill="#f59e0b" opacity="0.5"/>
    <text x="150" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f59e0b" text-anchor="middle">4+ weeks buffer</text>
    <!-- Description -->
    <text x="150" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Capital locked up in dead stock</text>
    <text x="150" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Over-ordering on slow movers.</text>
    <text x="150" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Margin quietly eroding.</text>
  </g>

  <!-- Formula section -->
  <rect x="80" y="452" width="1040" height="56" rx="8" fill="#0d2040"/>
  <rect x="80" y="452" width="1040" height="56" rx="8" fill="none" stroke="#2fd7c6" stroke-width="1.5"/>
  <text x="110" y="482" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#2fd7c6">FORMULA</text>
  <text x="110" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">Safety Stock = Average Weekly Sales × 2</text>
  <text x="600" y="482" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4">Reorder Point = (Avg Weekly Sales × Lead Time) + Safety Stock</text>
  <text x="600" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4">The 2-week buffer covers your lead time gap plus a demand spike.</text>

  <!-- When to hold more section -->
  <rect x="0" y="520" width="1200" height="110" fill="#081828"/>
  <rect x="0" y="520" width="1200" height="3" fill="url(#teal)"/>

  <text x="600" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">When to hold MORE than 2 weeks</text>

  <!-- Three scenarios -->
  <!-- Scenario 1 -->
  <g transform="translate(80, 560)">
    <circle cx="20" cy="16" r="14" fill="#2fd7c6"/>
    <text x="20" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0a1a31" text-anchor="middle">1</text>
    <text x="46" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Top 3-5 hero products</text>
    <text x="46" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7aa8c4">Anchor SKUs customers come in for</text>
    <text x="280" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">→ 3-4 weeks</text>
  </g>

  <!-- Scenario 2 -->
  <g transform="translate(460, 560)">
    <circle cx="20" cy="16" r="14" fill="#2fd7c6"/>
    <text x="20" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0a1a31" text-anchor="middle">2</text>
    <text x="46" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Erratic supplier lead times</text>
    <text x="46" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7aa8c4">Unpredictable delivery windows</text>
    <text x="280" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">→ 3-4 weeks</text>
  </g>

  <!-- Scenario 3 -->
  <g transform="translate(840, 560)">
    <circle cx="20" cy="16" r="14" fill="#2fd7c6"/>
    <text x="20" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0a1a31" text-anchor="middle">3</text>
    <text x="46" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Seasonal entering peak</text>
    <text x="46" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7aa8c4">Before a known demand spike</text>
    <text x="280" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">→ Extra buffer</text>
  </g>

  <text x="1120" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e3a6e" text-anchor="end">coodra.com</text>
</svg>