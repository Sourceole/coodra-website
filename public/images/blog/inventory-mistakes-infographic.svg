<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a31"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2fd7c6"/>
      <stop offset="100%" stop-color="#1fb5a3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#1a3560" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#teal)"/>

  <!-- Header -->
  <text x="600" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2fd7c6" text-anchor="middle" letter-spacing="3">RETAIL DECISION INTELLIGENCE</text>
  <text x="600" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">5 Inventory Mistakes</text>
  <text x="600" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">That Kill Margin</text>
  <text x="600" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#7aa8c4" text-anchor="middle">Each one compounds quietly. Coodra catches all five before they do permanent damage.</text>
  <line x1="180" y1="225" x2="1020" y2="225" stroke="#1e3a6e" stroke-width="1"/>

  <!-- ── Mistake 1: Static reorders ── -->
  <g transform="translate(120, 248)">
    <rect x="0" y="0" width="160" height="148" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="160" height="148" rx="10" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <!-- Icon: same quantity circle on loop arrow -->
    <circle cx="80" cy="44" r="22" fill="none" stroke="#2fd7c6" stroke-width="1.8"/>
    <line x1="66" y1="44" x2="94" y2="44" stroke="#2fd7c6" stroke-width="1.8"/>
    <!-- Loop arrow -->
    <polyline points="94,44 90,40 90,48" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- X on the item -->
    <line x1="74" y1="38" x2="86" y2="50" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="86" y1="38" x2="74" y2="50" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <!-- Label lines below circle -->
    <line x1="50" y1="78" x2="110" y2="78" stroke="#1e3a6e" stroke-width="1"/>
    <line x1="50" y1="88" x2="110" y2="88" stroke="#1e3a6e" stroke-width="1"/>
    <circle cx="80" cy="108" r="18" fill="#2fd7c6"/>
    <text x="80" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a1a31" text-anchor="middle">1</text>
    <text x="80" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Static reorders</text>
  </g>

  <!-- ── Mistake 2: No safety stock ── -->
  <g transform="translate(320, 248)">
    <rect x="0" y="0" width="160" height="148" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="160" height="148" rx="10" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <!-- Icon: shelf going to zero -->
    <line x1="48" y1="26" x2="112" y2="26" stroke="#2fd7c6" stroke-width="1.8"/>
    <!-- shelf levels -->
    <rect x="52" y="26" width="60" height="14" rx="2" fill="#2fd7c6" opacity="0.9"/>
    <rect x="52" y="44" width="60" height="14" rx="2" fill="#2fd7c6" opacity="0.6"/>
    <rect x="52" y="62" width="60" height="14" rx="2" fill="#2fd7c6" opacity="0.3"/>
    <!-- Zero / danger indicator -->
    <text x="80" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ef4444" text-anchor="middle">0</text>
    <circle cx="80" cy="108" r="18" fill="#2fd7c6"/>
    <text x="80" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a1a31" text-anchor="middle">2</text>
    <text x="80" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">No safety stock</text>
  </g>

  <!-- ── Mistake 3: Reacting to stockouts ── -->
  <g transform="translate(520, 248)">
    <rect x="0" y="0" width="160" height="148" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="160" height="148" rx="10" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <!-- Icon: empty shelf + alarm -->
    <line x1="48" y1="30" x2="112" y2="30" stroke="#ef4444" stroke-width="2"/>
    <line x1="48" y1="30" x2="48" y2="78" stroke="#ef4444" stroke-width="2"/>
    <line x1="48" y1="78" x2="112" y2="78" stroke="#ef4444" stroke-width="2"/>
    <line x1="112" y1="30" x2="112" y2="78" stroke="#ef4444" stroke-width="2"/>
    <!-- Alarm bell -->
    <path d="M80 38 Q80 26 92 26" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="94" cy="38" rx="8" ry="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <line x1="94" y1="48" x2="94" y2="52" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <circle cx="94" cy="55" r="2.5" fill="#f59e0b"/>
    <circle cx="80" cy="108" r="18" fill="#2fd7c6"/>
    <text x="80" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a1a31" text-anchor="middle">3</text>
    <text x="80" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Reactive stockouts</text>
  </g>

  <!-- ── Mistake 4: SKU confusion ── -->
  <g transform="translate(720, 248)">
    <rect x="0" y="0" width="160" height="148" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="160" height="148" rx="10" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <!-- Icon: two identical-looking boxes with ? swap -->
    <rect x="42" y="26" width="36" height="28" rx="3" fill="none" stroke="#2fd7c6" stroke-width="1.8"/>
    <rect x="82" y="26" width="36" height="28" rx="3" fill="none" stroke="#f59e0b" stroke-width="1.8"/>
    <text x="54" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#2fd7c6" text-anchor="middle">Lrg Slv</text>
    <text x="94" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">Lrg Bnd</text>
    <!-- Swap arrows between them -->
    <polyline points="72,40 80,32 88,40" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="72,48 80,56 88,48" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="80" cy="108" r="18" fill="#2fd7c6"/>
    <text x="80" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a1a31" text-anchor="middle">4</text>
    <text x="80" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">SKU confusion</text>
  </g>

  <!-- ── Mistake 5: Unknown true cost ── -->
  <g transform="translate(920, 248)">
    <rect x="0" y="0" width="160" height="148" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="160" height="148" rx="10" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <!-- Icon: price tag with ? and downward arrow -->
    <path d="M52 28 L80 20 L108 28 L108 62 Q108 72 98 72 L62 72 Q52 72 52 62 Z" fill="none" stroke="#2fd7c6" stroke-width="1.8" stroke-linejoin="round"/>
    <circle cx="80" cy="40" r="5" fill="#2fd7c6"/>
    <text x="80" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">?</text>
    <!-- Hidden cost layers -->
    <line x1="42" y1="76" x2="118" y2="76" stroke="#1e3a6e" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="36" y1="82" x2="124" y2="82" stroke="#1e3a6e" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="80" cy="108" r="18" fill="#2fd7c6"/>
    <text x="80" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a1a31" text-anchor="middle">5</text>
    <text x="80" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Unknown true cost</text>
  </g>

  <!-- Bottom CTA band -->
  <rect x="0" y="420" width="1200" height="210" fill="#081828"/>
  <rect x="0" y="420" width="1200" height="3" fill="url(#teal)"/>

  <!-- Coodra icon: decision compass -->
  <g transform="translate(100, 488)">
    <circle cx="44" cy="44" r="40" fill="none" stroke="#2fd7c6" stroke-width="1.5"/>
    <circle cx="44" cy="44" r="32" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <polygon points="44,18 48,40 44,44 40,40" fill="#2fd7c6"/>
    <polygon points="44,70 48,48 44,44 40,48" fill="#f59e0b"/>
    <line x1="12" y1="44" x2="24" y2="44" stroke="#1e3a6e" stroke-width="1.5"/>
    <line x1="64" y1="44" x2="76" y2="44" stroke="#1e3a6e" stroke-width="1.5"/>
    <line x1="44" y1="12" x2="44" y2="24" stroke="#1e3a6e" stroke-width="1.5"/>
    <line x1="44" y1="64" x2="44" y2="76" stroke="#1e3a6e" stroke-width="1.5"/>
  </g>

  <text x="230" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff">All five mistakes are fixable — if you catch them before they compound.</text>
  <text x="230" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7aa8c4">Coodra reviews your sales, inventory, and demand signals every week</text>
  <text x="230" y="556" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7aa8c4">and surfaces the five decisions most worth acting on — ranked by</text>
  <text x="230" y="577" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7aa8c4">impact on your margin, not by urgency alone.</text>
  <text x="230" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2fd7c6">Start free — no ERP required, connects your POS in one day.</text>

  <rect x="880" y="490" width="210" height="52" rx="8" fill="#2fd7c6"/>
  <text x="985" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#0a1a31" text-anchor="middle">Start free trial →</text>

  <text x="1150" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e3a6e" text-anchor="end">coodra.com</text>
</svg>