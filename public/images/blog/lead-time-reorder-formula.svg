<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f4f5f7"/>
  <text x="40" y="50" font-family="sans-serif" font-size="22" font-weight="700" fill="#0a1a31">The Lead Time Gap</text>
  <text x="40" y="75" font-family="sans-serif" font-size="14" fill="#506786">Why reordering "now" is always too late</text>

  <!-- Timeline bar -->
  <rect x="40" y="120" width="720" height="8" rx="4" fill="#e2e8f0"/>

  <!-- Lead time section -->
  <rect x="40" y="120" width="280" height="8" rx="4" fill="#2fd7c6"/>
  <text x="40" y="110" font-family="sans-serif" font-size="11" fill="#2fd7c6" font-weight="700">LEAD TIME</text>

  <!-- Gap section -->
  <rect x="320" y="120" width="200" height="8" rx="4" fill="#f59e0b"/>
  <text x="320" y="110" font-family="sans-serif" font-size="11" fill="#f59e0b" font-weight="700">THE GAP</text>

  <!-- Stock depletion section -->
  <rect x="520" y="120" width="240" height="8" rx="4" fill="#0a1a31"/>
  <text x="520" y="110" font-family="sans-serif" font-size="11" fill="#0a1a31" font-weight="700">STOCK DEPLETING</text>

  <!-- Order point marker -->
  <line x1="320" y1="108" x2="320" y2="145" stroke="#2fd7c6" stroke-width="2" stroke-dasharray="4"/>
  <circle cx="320" cy="120" r="6" fill="#2fd7c6"/>
  <text x="320" y="165" font-family="sans-serif" font-size="12" fill="#2fd7c6" text-anchor="middle">You place order</text>

  <!-- Stock level curve -->
  <polyline points="40,180 320,180 520,200 760,250" fill="none" stroke="#0a1a31" stroke-width="3"/>
  <polyline points="40,180 320,180 520,200 760,250" fill="rgba(10,26,49,0.06)" stroke="none"/>

  <!-- Safety stock line -->
  <line x1="40" y1="270" x2="760" y2="270" stroke="#2fd7c6" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="40" y="285" font-family="sans-serif" font-size="12" fill="#2fd7c6">Safety stock floor</text>

  <!-- Stockout point -->
  <circle cx="620" cy="270" r="8" fill="#ef4444"/>
  <line x1="620" y1="260" x2="620" y2="400" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <text x="620" y="320" font-family="sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">Stockout</text>
  <text x="620" y="340" font-family="sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">if lead time</text>
  <text x="620" y="356" font-family="sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">underestimated</text>

  <!-- Reorder arriving -->
  <line x1="700" y1="108" x2="700" y2="145" stroke="#2fd7c6" stroke-width="2" stroke-dasharray="4"/>
  <circle cx="700" cy="120" r="6" fill="#2fd7c6"/>
  <text x="700" y="165" font-family="sans-serif" font-size="12" fill="#2fd7c6" text-anchor="middle">Reorder arrives</text>

  <!-- Key insight box -->
  <rect x="40" y="360" width="340" height="30" rx="4" fill="#0a1a31"/>
  <text x="56" y="380" font-family="sans-serif" font-size="12" fill="#ffffff">Reorder Point = (Avg Weekly Sales × Lead Time) + Safety Stock</text>

  <!-- Problem box -->
  <rect x="420" y="360" width="340" height="30" rx="4" fill="#ef4444"/>
  <text x="436" y="380" font-family="sans-serif" font-size="12" fill="#ffffff">Most retailers use QUOTED lead time, not ACTUAL lead time</text>
</svg>
