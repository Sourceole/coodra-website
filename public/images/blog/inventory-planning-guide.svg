<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a31"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2fd7c6"/>
      <stop offset="100%" stop-color="#1fb5a3"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#1a3560" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#teal)"/>

  <!-- Header -->
  <text x="600" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2fd7c6" text-anchor="middle" letter-spacing="3">INVENTORY PLANNING FOR RETAIL</text>
  <text x="600" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">Weekly Inventory Planning</text>
  <text x="600" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">Workflow for Independent Retail</text>
  <text x="600" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#7aa8c4" text-anchor="middle">POS data, lead time, and margin — in 20 minutes a week. No spreadsheet required.</text>
  <line x1="180" y1="225" x2="1020" y2="225" stroke="#1e3a6e" stroke-width="1"/>

  <!-- ── Three-step workflow ── -->
  <!-- Step 1: POS data -->
  <g transform="translate(140, 260)">
    <rect x="0" y="0" width="240" height="170" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="240" height="170" rx="10" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <!-- Icon: POS terminal -->
    <rect x="88" y="20" width="64" height="50" rx="4" fill="none" stroke="#2fd7c6" stroke-width="1.8"/>
    <rect x="96" y="28" width="48" height="28" rx="2" fill="#2fd7c6" opacity="0.15"/>
    <rect x="96" y="28" width="48" height="12" rx="1" fill="#2fd7c6" opacity="0.3"/>
    <line x1="108" y1="64" x2="132" y2="64" stroke="#2fd7c6" stroke-width="1.5"/>
    <rect x="104" y="74" width="32" height="6" rx="2" fill="#2fd7c6" opacity="0.5"/>
    <circle cx="120" cy="108" r="18" fill="#2fd7c6"/>
    <text x="120" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a1a31" text-anchor="middle">1</text>
    <text x="120" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Pull POS data</text>
    <text x="120" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7aa8c4" text-anchor="middle">Velocity · On-hand · Trends</text>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(390, 330)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#2fd7c6" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="50,-5 60,0 50,5" fill="#2fd7c6"/>
  </g>

  <!-- Step 2: Calculate -->
  <g transform="translate(450, 260)">
    <rect x="0" y="0" width="240" height="170" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="240" height="170" rx="10" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <!-- Icon: formula -->
    <text x="120" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2fd7c6" text-anchor="middle">ROP = AWS × LT + SS</text>
    <line x1="40" y1="48" x2="200" y2="48" stroke="#1e3a6e" stroke-width="1"/>
    <text x="50" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7aa8c4">AWS = avg weekly sales</text>
    <text x="50" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7aa8c4">LT = lead time (weeks)</text>
    <text x="50" y="94" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7aa8c4">SS = 2× avg weekly sales</text>
    <!-- Compute gear icon -->
    <circle cx="160" cy="76" r="16" fill="none" stroke="#f59e0b" stroke-width="1.8"/>
    <circle cx="160" cy="76" r="6" fill="#f59e0b" opacity="0.4"/>
    <circle cx="120" cy="108" r="18" fill="#2fd7c6"/>
    <text x="120" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a1a31" text-anchor="middle">2</text>
    <text x="120" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Calculate</text>
    <text x="120" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7aa8c4" text-anchor="middle">Reorder points · Safety stock</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(700, 330)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#2fd7c6" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="50,-5 60,0 50,5" fill="#2fd7c6"/>
  </g>

  <!-- Step 3: Ranked decisions -->
  <g transform="translate(760, 260)">
    <rect x="0" y="0" width="240" height="170" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="240" height="170" rx="10" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <!-- Icon: ranked list -->
    <rect x="76" y="20" width="88" height="14" rx="3" fill="#2fd7c6" opacity="0.9"/>
    <rect x="76" y="38" width="72" height="10" rx="2" fill="#2fd7c6" opacity="0.6"/>
    <rect x="76" y="52" width="60" height="10" rx="2" fill="#2fd7c6" opacity="0.4"/>
    <rect x="76" y="66" width="80" height="10" rx="2" fill="#2fd7c6" opacity="0.3"/>
    <!-- Ranked badge -->
    <rect x="172" y="20" width="16" height="16" rx="3" fill="#f59e0b"/>
    <text x="180" y="31" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" fill="#0a1a31" text-anchor="middle">#1</text>
    <circle cx="120" cy="108" r="18" fill="#2fd7c6"/>
    <text x="120" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a1a31" text-anchor="middle">3</text>
    <text x="120" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Ranked decisions</text>
    <text x="120" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7aa8c4" text-anchor="middle">Approve or skip — weekly</text>
  </g>

  <!-- Bottom CTA band -->
  <rect x="0" y="455" width="1200" height="175" fill="#081828"/>
  <rect x="0" y="455" width="1200" height="3" fill="url(#teal)"/>

  <!-- Coodra compass -->
  <g transform="translate(100, 510)">
    <circle cx="44" cy="44" r="40" fill="none" stroke="#2fd7c6" stroke-width="1.5"/>
    <circle cx="44" cy="44" r="32" fill="none" stroke="#1e3a6e" stroke-width="1"/>
    <polygon points="44,18 48,40 44,44 40,40" fill="#2fd7c6"/>
    <polygon points="44,70 48,48 44,44 40,48" fill="#f59e0b"/>
    <line x1="12" y1="44" x2="24" y2="44" stroke="#1e3a6e" stroke-width="1.5"/>
    <line x1="64" y1="44" x2="76" y2="44" stroke="#1e3a6e" stroke-width="1.5"/>
    <line x1="44" y1="12" x2="44" y2="24" stroke="#1e3a6e" stroke-width="1.5"/>
    <line x1="44" y1="64" x2="44" y2="76" stroke="#1e3a6e" stroke-width="1.5"/>
  </g>

  <text x="230" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff">20 minutes a week. Ranked decisions. No consultant.</text>
  <text x="230" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7aa8c4">Coodra pulls your POS data, calculates reorder points, and surfaces</text>
  <text x="230" y="581" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7aa8c4">the decisions most worth acting on — every Monday morning.</text>
  <text x="230" y="605" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2fd7c6">No ERP required. Live in a day.</text>

  <rect x="880" y="518" width="210" height="52" rx="8" fill="#2fd7c6"/>
  <text x="985" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#0a1a31" text-anchor="middle">Start free trial →</text>

  <text x="1150" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e3a6e" text-anchor="end">coodra.com</text>
</svg>