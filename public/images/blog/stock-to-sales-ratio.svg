<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a31"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2fd7c6"/>
      <stop offset="100%" stop-color="#1fb5a3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#1a3560" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#teal)"/>

  <!-- Header -->
  <text x="600" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2fd7c6" text-anchor="middle" letter-spacing="3">INVENTORY MANAGEMENT · RETAIL METRICS</text>
  <text x="600" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">The Stock-to-Sales Ratio</text>
  <text x="600" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">A Simple Metric Most Retailers Skip</text>
  <text x="600" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#7aa8c4" text-anchor="middle">It tells you how long inventory sits before it sells. Lower is better. Here is how to use it.</text>
  <line x1="180" y1="225" x2="1020" y2="225" stroke="#1e3a6e" stroke-width="1"/>

  <!-- ── Formula box ── -->
  <rect x="160" y="245" width="880" height="72" rx="12" fill="#0d2040"/>
  <rect x="160" y="245" width="880" height="72" rx="12" fill="none" stroke="#2fd7c6" stroke-width="1.5"/>
  <text x="600" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Stock-to-Sales Ratio = Average Inventory on Hand ÷ Net Sales (units or $)</text>
  <text x="600" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Lower ratio = inventory turns faster. Higher ratio = capital is sitting on shelves.</text>

  <!-- ── Three example cards ── -->
  <!-- Card 1: Healthy ratio -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="320" height="200" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="320" height="200" rx="10" fill="none" stroke="#2fd7c6" stroke-width="2"/>
    <!-- Top accent: green/teal -->
    <rect x="0" y="0" width="320" height="6" rx="3" fill="#2fd7c6"/>
    <text x="160" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2fd7c6" text-anchor="middle" letter-spacing="2">HEALTHY RATIO</text>
    <!-- Ratio number -->
    <text x="160" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#2fd7c6" text-anchor="middle">1.8x</text>
    <!-- Description -->
    <text x="160" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">18 days of inventory</text>
    <text x="160" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Tight, fast-turning stock</text>
    <text x="160" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Strong margin protection</text>
    <!-- Status dot -->
    <circle cx="280" cy="36" r="8" fill="#2fd7c6"/>
    <text x="280" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" fill="#0a1a31" text-anchor="middle">✓</text>
  </g>

  <!-- Card 2: Warning ratio -->
  <g transform="translate(440, 340)">
    <rect x="0" y="0" width="320" height="200" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="320" height="200" rx="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="6" rx="3" fill="#f59e0b"/>
    <text x="160" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">CAUTION RATIO</text>
    <text x="160" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#f59e0b" text-anchor="middle">3.4x</text>
    <text x="160" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">34 days of inventory</text>
    <text x="160" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Stock sitting longer than ideal</text>
    <text x="160" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Review and reduce reorder quantities</text>
    <circle cx="280" cy="36" r="8" fill="#f59e0b"/>
    <text x="280" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#0a1a31" text-anchor="middle">!</text>
  </g>

  <!-- Card 3: Danger ratio -->
  <g transform="translate(800, 340)">
    <rect x="0" y="0" width="320" height="200" rx="10" fill="#0d2040"/>
    <rect x="0" y="0" width="320" height="200" rx="10" fill="none" stroke="#ef4444" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="6" rx="3" fill="#ef4444"/>
    <text x="160" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="2">DEAD STOCK ZONE</text>
    <text x="160" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ef4444" text-anchor="middle">6.2x</text>
    <text x="160" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">62+ days of inventory</text>
    <text x="160" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Excess dead stock building</text>
    <text x="160" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7aa8c4" text-anchor="middle">Immediate markdown + reduce orders</text>
    <circle cx="280" cy="36" r="8" fill="#ef4444"/>
    <text x="280" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">✕</text>
  </g>

  <!-- Bottom CTA -->
  <rect x="0" y="560" width="1200" height="70" fill="#081828"/>
  <rect x="0" y="560" width="1200" height="2" fill="url(#teal)"/>
  <text x="600" y="585" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Calculate your stock-to-sales ratio by category — not just store-wide.</text>
  <text x="600" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7aa8c4" text-anchor="middle">Coodra tracks this per SKU and flags categories drifting into danger zone before margin erodes.</text>
  <rect x="900" y="568" width="200" height="44" rx="8" fill="#2fd7c6"/>
  <text x="1000" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0a1a31" text-anchor="middle">Start free →</text>
  <text x="1150" y="622" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e3a6e" text-anchor="end">coodra.com</text>
</svg>